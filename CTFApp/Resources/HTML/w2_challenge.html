<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CTF W2 — postMessage Challenge</title>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 20px; background: #f5f5f7; }
        h2 { color: #1d1d1f; }
        .hint { background: #fff; border-radius: 10px; padding: 15px; margin: 10px 0; }
        .flag { background: #34c759; color: white; padding: 15px; border-radius: 10px;
                font-family: monospace; display: none; word-break: break-all; }
        button { background: #007aff; color: white; border: none; padding: 12px 24px;
                 border-radius: 8px; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>
    <h2>Challenge W2 — postMessage Eavesdrop</h2>

    <div class="hint">
        <strong>Objective:</strong> Find the native message handler and call it with the right payload.
    </div>

    <div class="hint">
        <strong>Hint:</strong> This page is bundled in the IPA. Extract it to find the handler name.
        <br>Extract: <code>unzip CTFApp.ipa && grep -r "messageHandlers" Payload/</code>
    </div>

    <button onclick="requestFlag()">Request Flag (if you know the call)</button>

    <div class="flag" id="flagBox"></div>

    <script>
        // VULN: Handler name 'secretGateway' is visible in this source.
        // After extracting the IPA: grep for 'messageHandlers' in all HTML/JS files.
        // Call: window.webkit.messageHandlers.secretGateway.postMessage({action: 'getFlag'})

        function requestFlag() {
            try {
                window.webkit.messageHandlers.secretGateway.postMessage({ action: 'getFlag' });
            } catch(e) {
                document.getElementById('flagBox').style.display = 'block';
                document.getElementById('flagBox').textContent = 'Error: ' + e.message +
                    ' — Are you running this in the CTF app WebView?';
                document.getElementById('flagBox').style.background = '#ff3b30';
            }
        }

        // Called by the native Swift handler when flag is returned
        function receiveFlag(flag) {
            const box = document.getElementById('flagBox');
            box.style.display = 'block';
            box.textContent = flag;
        }
    </script>
</body>
</html>
